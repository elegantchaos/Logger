              echo "id=$DESTINATION_ID"
              echo "name=$DESTINATION_NAME"
              echo "os=$DESTINATION_OS"
            } >> "$GITHUB_OUTPUT"
        - name: Build (watchOS release)
          if: ${{ steps.select-destination.outputs.available == 'true' }}
          run: |
            set -o pipefail
            source "setup.sh"
              DESTINATION_ID="${{ steps.select-destination.outputs.id }}"
              DESTINATION_NAME="${{ steps.select-destination.outputs.name }}"
              DESTINATION_OS="${{ steps.select-destination.outputs.os }}"
            echo "Building workspace $WORKSPACE scheme $SCHEME on ${DESTINATION_NAME:-unknown} (watchOS ${DESTINATION_OS:-unknown}, id=${DESTINATION_ID:-unknown})."
            xcodebuild clean build -workspace "$WORKSPACE" -scheme "$SCHEME" -destination "id=$DESTINATION_ID" -configuration Release CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO ENABLE_TESTABILITY=YES | tee logs/xcodebuild-watchOS-build-release.log | xcbeautify --quiet --disable-logging --renderer github-actions
        - name: Upload Logs
          uses: actions/upload-artifact@v7
          if: always()
          with:
            name: watchOS-swift63-logs
            path: logs

